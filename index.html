<!DOCTYPE html>
<html>
<head>
  <title>TMCARS LLC</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    .car {
      background: #222;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
    img {
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>TMCARS INVENTORY</h1>

<div id="cars"></div>

<script>
const AIRTABLE_TOKEN = "";
const BASE_ID = "PASTE_BASE_ID";
const TABLE_NAME = "CARS";

fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_NAME}`, {
  headers: {
    Authorization: `Bearer ${AIRTABLE_TOKEN}`
  }
})
.then(res => res.json())
.then(data => {
  const container = document.getElementById("cars");

  data.records.forEach(record => {
    const car = record.fields;

    const div = document.createElement("div");
    div.className = "car";

    div.innerHTML = `
      <h2>${car.Make || ""} ${car.Model || ""}</h2>
      <p>Year: ${car.Year || ""}</p>
      <p>Price: $${car.Price || ""}</p>
      <p>Mileage: ${car.Mileage || ""}</p>
      <p>${car.Description || ""}</p>
      ${car.Attachments ? `<img src="${car.Attachments[0].url}">` : ""}
    `;

    container.appendChild(div);
  });
});
</script>

</body>
</html>
