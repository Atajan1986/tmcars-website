<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMCARS LLC</title>

<script src="https://upload-widget.cloudinary.com/global/all.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.header {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header img {
  height: 50px;
}

.container {
  padding: 20px;
}

.car {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 20px;
}

.main-img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 8px;
}

.gallery {
  display: flex;
  gap: 5px;
  margin-top: 10px;
  overflow-x: auto;
}

.gallery img {
  width: 80px;
  height: 60px;
  object-fit: cover;
  cursor: pointer;
  border-radius: 5px;
}

button {
  background: #111;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>TMCARS LLC</div>
  <button onclick="openUploader()">Upload Photos</button>
</div>

<div class="container" id="cars"></div>

<script>
let cars = [];

function openUploader() {
  cloudinary.openUploadWidget({
    cloudName: 'dnmq18pmn',
    uploadPreset: 'tmcars_upload',
    multiple: true,
    maxFiles: 20
  }, (error, result) => {

    if (!error && result.event === "success") {

      let url = result.info.secure_url;

      if (cars.length === 0) {
        cars.push({
          images: []
        });
      }

      cars[0].images.push(url);

      renderCars();
    }

  });
}

function renderCars() {
  let html = "";

  cars.forEach((car, index) => {

    let main = car.images[0];

    html += `
      <div class="car">
        <img src="${main}" class="main-img" id="main-${index}">
        
        <div class="gallery">
          ${car.images.map(img => `
            <img src="${img}" onclick="changeImage(${index}, '${img}')">
          `).join("")}
        </div>

        <button>Call About This Car</button>
      </div>
    `;
  });

  document.getElementById("cars").innerHTML = html;
}

function changeImage(index, img) {
  document.getElementById("main-" + index).src = img;
}
</script>

</body>
</html>
