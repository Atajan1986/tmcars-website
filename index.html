<!DOCTYPE html>
<html>
<head>
  <title>TMCARS LLC</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .car {
      background: #222;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>TMCARS INVENTORY</h1>

<div id="cars"></div>

<script>
fetch("/.netlify/functions/cars")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("cars");

    data.records.forEach(record => {
      const car = record.fields;

      const photos = car.Attachments || [];
      const firstPhoto = photos.length ? photos[0].url : "";

      const div = document.createElement("div");
      div.className = "car";

      div.innerHTML = `
        <h2>${car.Make || ""} ${car.Model || ""}</h2>
        <p>Year: ${car.Year || ""}</p>
        <p>Price: $${car.Price || ""}</p>
        <p>Mileage: ${car.Mileage || ""}</p>
        <p>${car.Description || ""}</p>
        ${firstPhoto ? `<img src="${firstPhoto}">` : ""}
      `;

      container.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById("cars").innerHTML = "Error loading cars";
  });
</script>

</body>
</html>
